# Clean Nginx configuration for API
# Replace the HTTP server block with this:

server {
    listen 80;
    server_name api.coffee.ereshchenko.com;
    return 301 https://$host$request_uri;
}

# The HTTPS server block looks correct, just make sure it has:
server {
    listen 443 ssl http2;
    server_name api.coffee.ereshchenko.com;

    ssl_certificate /etc/letsencrypt/live/api.coffee.ereshchenko.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.coffee.ereshchenko.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Optional: Add timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
