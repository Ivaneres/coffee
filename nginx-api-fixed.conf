# Fixed Nginx configuration for API
# The problem: The redirect 'if' statement was in the HTTPS block

# HTTP server block - redirects to HTTPS
server {
    listen 80;
    server_name api.coffee.ereshchenko.com;
    return 301 https://$host$request_uri;
}

# HTTPS server block - proxies to backend (NO redirect here!)
server {
    listen 443 ssl http2;
    server_name api.coffee.ereshchenko.com;

    ssl_certificate /etc/letsencrypt/live/api.coffee.ereshchenko.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.coffee.ereshchenko.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # NO redirect here - just proxy!
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
